<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Cinema Matrix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎬 Cinema Matrix</h1>
                <p>Crear Nueva Cuenta</p>
            </div>

            <form class="auth-form" onsubmit="registrarUsuario(event)">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        placeholder="Juan Pérez"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-password">
                        <input
                            type="password"
                            id="password"
                            placeholder="Mínimo 6 caracteres"
                            required
                        >
                        <button type="button" class="btn-toggle-password" onclick="togglePassword('password', this)">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <div class="input-password">
                        <input
                            type="password"
                            id="confirm-password"
                            placeholder="Repite tu contraseña"
                            required
                        >
                        <button type="button" class="btn-toggle-password" onclick="togglePassword('confirm-password', this)">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="admin-code">Código de administrador <span style="color: var(--text-muted); font-size: 0.8rem;">(opcional)</span></label>
                    <div class="input-password">
                        <input
                            type="password"
                            id="admin-code"
                            placeholder="Solo si eres administrador"
                        >
                        <button type="button" class="btn-toggle-password" onclick="togglePassword('admin-code', this)">👁️</button>
                    </div>
                </div>

                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>

                <button type="submit" class="btn-primary btn-full">
                    Registrarse
                </button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? 
                    <a href="inicio_sesion.html" class="link-primary">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
