<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Cinema Matrix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎬 Cinema Matrix</h1>
                <p>Crear Nueva Cuenta</p>
            </div>

            <form class="auth-form" onsubmit="registrarUsuario(event)">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input 
                        type="text" 
                        id="nombre" 
                        placeholder="Juan Pérez"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Mínimo 6 caracteres"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        placeholder="Repite tu contraseña"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Tipo de Cuenta</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input 
                                type="radio" 
                                id="cliente" 
                                name="tipo" 
                                value="Cliente"
                                checked
                            >
                            <label for="cliente">👤 Cliente</label>
                        </div>
                        <div class="radio-option">
                            <input 
                                type="radio" 
                                id="admin" 
                                name="tipo" 
                                value="Admin"
                            >
                            <label for="admin">👨‍💼 Administrador</label>
                        </div>
                    </div>
                </div>

                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>

                <button type="submit" class="btn-primary btn-full">
                    Registrarse
                </button>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? 
                    <a href="inicio_sesion.html" class="link-primary">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function registrarUsuario(event) {
            event.preventDefault();
            
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');

            // Limpiar mensajes
            errorMsg.textContent = '';
            successMsg.textContent = '';

            // Validaciones
            if (!nombre || !email || !password || !confirmPassword) {
                errorMsg.textContent = 'Completa todos los campos';
                return;
            }

            if (nombre.length < 3) {
                errorMsg.textContent = 'El nombre debe tener al menos 3 caracteres';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'La contraseña debe tener mínimo 6 caracteres';
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.textContent = 'Las contraseñas no coinciden';
                return;
            }

            // Validar formato de email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorMsg.textContent = 'Ingresa un email válido';
                return;
            }

            // Verificar si el email ya existe
            const usuariosGuardados = JSON.parse(localStorage.getItem('usuarios')) || [];
            if (usuariosGuardados.some(u => u.email === email)) {
                errorMsg.textContent = 'Este email ya está registrado';
                return;
            }

            // Crear nuevo usuario
            const nuevoUsuario = {
                id: Date.now(),
                nombre: nombre,
                email: email,
                password: password,
                tipo: tipo,
                fechaRegistro: new Date().toLocaleDateString('es-ES')
            };

            // Guardar en localStorage
            usuariosGuardados.push(nuevoUsuario);
            localStorage.setItem('usuarios', JSON.stringify(usuariosGuardados));

            // Mostrar mensaje de éxito
            successMsg.textContent = '✅ Cuenta creada exitosamente. Redirigiendo...';
            
            // Redirigir a inicio de sesión después de 2 segundos
            setTimeout(() => {
                window.location.href = 'inicio_sesion.html';
            }, 2000);
        }

        // Cargar usuarios de prueba si no existen
        window.addEventListener('DOMContentLoaded', () => {
            const usuariosExistentes = JSON.parse(localStorage.getItem('usuarios')) || [];
            if (usuariosExistentes.length === 0) {
                const usuariosPrueba = [
                    {
                        id: 1,
                        nombre: 'Admin User',
                        email: 'admin@cinema.com',
                        password: '123456',
                        tipo: 'Admin',
                        fechaRegistro: new Date().toLocaleDateString('es-ES')
                    },
                    {
                        id: 2,
                        nombre: 'Cliente Test',
                        email: 'cliente@cinema.com',
                        password: '123456',
                        tipo: 'Cliente',
                        fechaRegistro: new Date().toLocaleDateString('es-ES')
                    }
                ];
                localStorage.setItem('usuarios', JSON.stringify(usuariosPrueba));
            }
        });
    </script>
</body>
</html>
