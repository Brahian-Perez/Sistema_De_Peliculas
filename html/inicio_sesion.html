<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cinema Matrix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎬 Cinema Matrix</h1>
                <p>Iniciar Sesión</p>
            </div>

            <form class="auth-form" onsubmit="iniciarSesion(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Mínimo 6 caracteres"
                        required
                    >
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn-primary btn-full">
                    Iniciar Sesión
                </button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? 
                    <a href="registrar.html" class="link-primary">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function iniciarSesion(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            // Limpiar mensaje de error
            errorMsg.textContent = '';

            // Validaciones
            if (!email || !password) {
                errorMsg.textContent = 'Completa todos los campos';
                return;
            }

            if (password.length < 6) {
                errorMsg.textContent = 'La contraseña debe tener mínimo 6 caracteres';
                return;
            }

            // Simulación: obtener usuario del localStorage
            const usuariosGuardados = JSON.parse(localStorage.getItem('usuarios')) || [];
            const usuario = usuariosGuardados.find(u => u.email === email && u.password === password);

            if (usuario) {
                localStorage.setItem('usuarioActual', JSON.stringify(usuario));
                window.location.href = 'principal.html';
            } else {
                errorMsg.textContent = 'Email o contraseña incorrectos';
            }
        }

        // Cargar usuarios de prueba si no existen
        window.addEventListener('DOMContentLoaded', () => {
            const usuariosExistentes = JSON.parse(localStorage.getItem('usuarios')) || [];
            if (usuariosExistentes.length === 0) {
                const usuariosPrueba = [
                    {
                        id: 1,
                        nombre: 'Admin User',
                        email: 'admin@cinema.com',
                        password: '123456',
                        tipo: 'Admin',
                        fechaRegistro: new Date().toLocaleDateString('es-ES')
                    },
                    {
                        id: 2,
                        nombre: 'Cliente Test',
                        email: 'cliente@cinema.com',
                        password: '123456',
                        tipo: 'Cliente',
                        fechaRegistro: new Date().toLocaleDateString('es-ES')
                    }
                ];
                localStorage.setItem('usuarios', JSON.stringify(usuariosPrueba));
            }
        });
    </script>
</body>
</html>
