<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cinema Matrix</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🎬 Cinema Matrix</h1>
                <p>Iniciar Sesión</p>
            </div>

            <form class="auth-form" onsubmit="iniciarSesion(event)">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-password">
                        <input
                            type="password"
                            id="password"
                            placeholder="Mínimo 6 caracteres"
                            required
                        >
                        <button type="button" class="btn-toggle-password" onclick="togglePassword('password', this)">👁️</button>
                    </div>
                </div>

                <div id="error-message" class="error-message"></div>

                <button type="submit" class="btn-primary btn-full">
                    Iniciar Sesión
                </button>
            </form>

            <div class="auth-footer">
                <p>¿No tienes cuenta? 
                    <a href="registrar.html" class="link-primary">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
